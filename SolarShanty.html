ags:{},discoveredPlaces:[],hullId:c.kind,lettersFound:[]};return $m(h),zu(h,o,1,!0),Ou(h,o,1),jf(h,1),h}const Io="court",Vu=[{id:"drawer",order:1,title:"The Drawer",location:"bunk drawer, cabin — findable from day one",body:["If you're reading this, you found the first one. There's four more — I tucked them where I figured you'd eventually stand, not where you'd go looking on purpose. That's the whole game, if you want to call it one.",`Start with the easy part: the name. "Dustyfoot" isn't something I made up. It's old — Scots, for a peddler. Someone who worked fairs and markets on foot, moving around so much his feet never got the chance to stay clean. A boat wanders better than any cart ever did, and I liked that a word that old could still fit something this new. That's as much as I'll say today.`,"More on that later. Next one's wherever the work gets posted.","— S."]},{id:"fair",order:2,title:"The Fair",location:"Miller's Landing gig board — the first full marina",body:["Funny, finding this one where the jobs are pinned up. There used to be a town out where I worked that was basically one long fair — everybody passing through, nobody staying, business done on a handshake because nobody had the time or the address for paperwork.","I sold something out there too. Their letters home, in a manner of speaking — though it wasn't paper and it wasn't stamps. Whatever it was, it let people who'd parked themselves in the middle of nowhere reach whoever they'd left behind. I won't tell you exactly what. You'll get there.","Turns out that trade is about as old as travelers are. I just didn't do it with a cart of dry goods.","Next one's up top, where the sun does the work now.","— S."]},{id:"sky",order:3,title:"The Sky",location:"roof, beside the solar array",body:["All right. Here's the part I skipped: I made my living pointing things at the sky. That's the plainest way I know to say it. Every rig I built had one part I'm still proud of — a bracket, nothing fancy, that kept the whole thing from planting its face in the dirt under its own weight. People who never met me went on calling it by a name I gave it, for years, without knowing whose it was.","That panel bank over your head is doing the same trick — pointed at the sky, pulling something down out of it. Different sky, same idea, same bracket keeping it from tipping. I like that it's still the sky.","One more, and you'll have the whole shape of it.","— S."]},{id:"turn",order:4,title:"The Turn",location:"Old Betsy's deck",body:["I'll be straight about how it ended, since I finally told you the rest back at the panels. Towers went up. Phones got smart enough to carry their own signal. Nobody needed a guy with a dish and a tripod once the connection just followed them around for free. The trade thinned out the way trades do — not all at once, just a little less every season, until one year I noticed I hadn't shipped a system in a while.","I'm not telling you that to make it sad. Trading dust for water instead of dust for signal isn't a step down, far as I'm concerned. Same guy, same restlessness, better view.","You've got the whole story now, if you want the last of it. It's close to where you started.","— S."]},{id:"court",order:5,title:"The Court",location:"cabin, near the bunk — unlocked once the other four are found",body:[`Last one. Here's the payoff for reading this far: the word doesn't stop at "peddler." Medieval fairs ran their own courts for people exactly like me — traders who'd be gone before an ordinary court got around to hearing them. In the old Scots they called it a court of dusty feet: a ruling fast enough that the dust from your boots hadn't settled before you had your answer. No waiting around for people who were never going to wait around themselves.`,"I've thought about that a lot since. A whole legal tradition built on the idea that some people only ever pass through, and the world has to keep pace or lose them. That's the name. That's always been the name.","
