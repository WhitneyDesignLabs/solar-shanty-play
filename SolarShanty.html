 just weight, put where it belonged instead of where it was cheapest to bolt on. People called it "the bracket" for years without knowing whose it was.`,"That panel bank over your head is doing the same trick the dish did — pointed at the sky, pulling something down out of it. Different sky, same idea, same bracket keeping it from tipping. I like that it's still the sky.","One more, and you'll have the whole shape of it.","— S."]},{id:"turn",order:4,title:"The Turn",location:"Old Betsy's deck",body:["I'll be straight about how it ended, since I was straight about the rest. Towers went up. Phones got smart enough to carry their own signal. Nobody needed a guy with a dish and a tripod once the connection just followed them around for free. The trade thinned out the way trades do — not all at once, just a little less every season, until one year I noticed I hadn't shipped a system in a while.","I'm not telling you that to make it sad. Trading dust for water instead of dust for signal isn't a step down, far as I'm concerned. Same guy, same restlessness, better view.","You've got the whole story now, if you want the last of it. It's close to where you started.","— S."]},{id:"court",order:5,title:"The Court",location:"cabin, near the bunk — unlocked once the other four are found",body:[`Last one. Here's the payoff for reading this far: the word doesn't stop at "peddler." Medieval fairs ran their own courts for people exactly like me — traders who'd be gone before an ordinary court got around to hearing them. In the old Scots they called it a court of dusty feet: a ruling fast enough that the dust from your boots hadn't settled before you had your answer. No waiting around for people who were never going to wait around themselves.`,"I've thought about that a lot since. A whole legal tradition built on the idea that some people only ever pass through, and the world has to keep pace or lose them. That's the name. That's always been the name.","She's yours now — every board,
